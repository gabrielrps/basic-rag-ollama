spring:

  datasource:
    url: jdbc:postgresql://192.168.1.19:5432/vectordb
    username: user
    password: password
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.xml

  ai:
    ollama:
      base-url: http://192.168.1.19:11434
      chat:
        options:
          model: llama3
      embedding:
        options:
          model: nomic-embed-text

    vectorstore:
      pgvector:
        initialize-schema: true
        table-name: vector_store
        index-type: HNSW
        distance-type: COSINE_DISTANCE

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB